name: OpenCode — Complete Gate

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  complete-gate:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'pull_request' && github.event.label.name == 'auto-review') ||
      github.event_name == 'check_run' ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc complete-gate'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      checks: read
      issues: write
    steps:
      - name: Generate App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Install target repo dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          for i in 1 2 3; do
            gh label create "autofix-attempts-$i" --repo "$REPO" --color "d93f0b" --description "Autofix attempt counter" || true
          done
          gh label create "autofix-exhausted" --repo "$REPO" --color "b60205" --description "Autofix retries exhausted — manual intervention required" || true
          gh label create "ready for review" --repo "$REPO" --color "0e8a16" --description "Human reviewer needed" || true
          gh label create "gate-running" --repo "$REPO" --color "6f42c1" --description "Complete-gate is currently processing this PR" || true

      - name: Determine PR number and head SHA
        id: meta
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          elif [ "${{ github.event_name }}" == "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          fi

          # Fallback: find PR by head SHA if pull_requests array was empty
          if [ -z "$PR_NUMBER" ] && [ -n "$HEAD_SHA" ]; then
            PR_NUMBER=$(gh pr list --repo "$REPO" --state open --json number,headRefOid -q ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number")
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid -q .headRefOid)
          fi
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName -q .baseRefName 2>/dev/null || echo "")
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "base_branch=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Prevent concurrent runs for same PR
        if: steps.meta.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -q "^gate-running$"; then
            echo "Another complete-gate run is already processing PR #$PR_NUMBER. Exiting to prevent duplicate work."
            exit 0
          fi
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "gate-running"

      - name: Validate PR labels
        id: validate
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name')
          if ! echo "$PR_LABELS" | grep -q "^auto-review$"; then
            echo "PR does not have 'auto-review' label."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check associated issue for opencode label
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q '.body')
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oEi '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[[:space:]]*#[0-9]+' | grep -oE '[0-9]+' || true)

          if [ -n "$ISSUE_NUMBERS" ]; then
            for ISSUE in $ISSUE_NUMBERS; do
              ISSUE_LABELS=$(gh issue view "$ISSUE" --repo "$REPO" --json labels -q '.labels[].name' 2>/dev/null || true)
              if echo "$ISSUE_LABELS" | grep -q "^opencode$"; then
                echo "Associated issue #$ISSUE has 'opencode' label."
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
            echo "No associated issue has 'opencode' label."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No associated issue found. Proceeding without opencode check."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Create progress comment
        if: steps.validate.outputs.should_run == 'true'
        id: progress_comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$'🤖 **OpenCode Complete Gate is processing this PR...**\n\nThe auto-review gate has started evaluating this PR. This comment will be updated when processing completes.\n\n[Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.id' \
            -f body="$BODY" || echo "")
          echo "comment_id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Install OpenCode
        if: steps.validate.outputs.should_run == 'true'
        run: npm install -g opencode-ai@1.14.24

      - name: Pre-fetch PR context
        if: steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
        run: |
          npx tsx .opencode/skills/_shared/scripts/fetch-pr-context.ts "$PR_NUMBER" || true

      - name: Count autofix attempts
        id: attempts
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name')
          COUNT=0
          for i in 1 2 3; do
            if echo "$LABELS" | grep -q "^autofix-attempts-$i$"; then
              COUNT=$i
            fi
          done
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge 3 ]; then
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
          else
            echo "exhausted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check mergeability
        id: mergeable
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          MERGE_STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeable,mergeStateStatus -q '.mergeable + " " + .mergeStateStatus')
          echo "merge_state=${MERGE_STATE}" >> "$GITHUB_OUTPUT"
          if echo "$MERGE_STATE" | grep -q 'CONFLICTING\|DIRTY'; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove auto-review label (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "auto-review"

      - name: Update progress comment — resolving conflicts
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          ATTEMPT=$(( ${{ steps.attempts.outputs.count }} + 1 ))
          BODY=$(printf '🤖 **OpenCode Complete Gate** — resolving merge conflicts (attempt %s of 3)...\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "$ATTEMPT" "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Resolve merge conflicts
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          opencode run --model opencode-go/deepseek-v4-pro "Load the resolve-pr-conflicts skill and run it for PR #${{ steps.meta.outputs.pr_number }}"

      - name: Record autofix attempt (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=${{ steps.attempts.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-attempts-$COUNT" || true
          fi
          NEXT=$((COUNT + 1))
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-attempts-$NEXT"

      - name: Re-add auto-review label (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-review"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready for review" || true

      - name: Update progress comment — conflicts exhausted
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          BODY=$(printf '🤖 **OpenCode Complete Gate** — merge conflicts persist after 3 resolution attempts. Manual intervention required.\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Post exhaustion warning (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-exhausted"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ Autofix exhausted after 3 attempts (conflict resolution). Manual intervention required."

      - name: Update progress comment — waiting for CI
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          BODY=$(printf '🤖 **OpenCode Complete Gate** — waiting for CI checks to complete...\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Wait for checks to finish
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.validate.outputs.should_run == 'true'
        id: ci
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
        run: |
          # We intentionally do NOT call the branch-protection API here because
          # the default GITHUB_TOKEN lacks administration:read permission, so the
          # call always returns 403. Instead we monitor every check-run except
          # our own OpenCode workflows (to avoid dead-locking while we wait for
          # ourselves to finish).
          INCOMPLETE_JQ='[.check_runs[] | select(.status != "completed" and (.name | ascii_downcase | contains("opencode") | not))] | length'
          CONCLUSIONS_JQ='.check_runs[] | select(.status == "completed" and (.name | ascii_downcase | contains("opencode") | not)) | .conclusion'

          echo "INCOMPLETE_JQ: $INCOMPLETE_JQ"
          echo "CONCLUSIONS_JQ: $CONCLUSIONS_JQ"


          # Poll until all relevant checks finish
          for i in {1..60}; do
            CHECK_RUNS_JSON=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq '.' 2>/dev/null || true)
            if [ -z "$CHECK_RUNS_JSON" ]; then
              echo "Failed to fetch check-runs from GitHub API. Treating as failing."
              echo "status=failing" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            TOTAL_CHECKS=$(echo "$CHECK_RUNS_JSON" | jq '.check_runs | length')
            INCOMPLETE=$(echo "$CHECK_RUNS_JSON" | jq "$INCOMPLETE_JQ") || {
              echo "Failed to parse check-runs response. Treating as failing."
              echo "status=failing" >> "$GITHUB_OUTPUT"
              exit 0
            }
            echo "Iteration $i: total check runs = $TOTAL_CHECKS, incomplete non-OpenCode = $INCOMPLETE"

            if [ "$INCOMPLETE" -gt 0 ]; then
              echo "Waiting for ${INCOMPLETE} check(s) to complete..."
              sleep 10
            else
              break
            fi
          done

          CHECK_RUNS_JSON=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq '.' 2>/dev/null || true)
          if [ -z "$CHECK_RUNS_JSON" ]; then
            echo "Failed to fetch check-runs from GitHub API. Treating as failing."
            echo "status=failing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "--- All check runs ---"
          echo "$CHECK_RUNS_JSON" | jq -r '[.check_runs[] | {name, status, conclusion}] | .[]' || true
          echo "----------------------"

          CONCLUSIONS=$(echo "$CHECK_RUNS_JSON" | jq -r "$CONCLUSIONS_JQ") || {
            echo "Failed to parse check-runs response. Treating as failing."
            echo "status=failing" >> "$GITHUB_OUTPUT"
            exit 0
          }

          echo "Relevant conclusions (excluding OpenCode):"
          echo "$CONCLUSIONS"

          TOTAL_CHECKS=$(echo "$CHECK_RUNS_JSON" | jq '.check_runs | length')
          echo "Total check runs: $TOTAL_CHECKS"

          if echo "$CONCLUSIONS" | grep -qE 'failure|cancelled|timed_out|action_required|startup_failure'; then
            echo "Detected failing/cancelled/timed_out/action_required/startup_failure conclusion."
            echo "status=failing" >> "$GITHUB_OUTPUT"
          else
            echo "No failing conclusions detected among reported checks. Validating required checks..."

            # Verify required status checks from branch protection.
            # The app token may have administration permissions that GITHUB_TOKEN lacks.
            BASE_BRANCH="${{ steps.meta.outputs.base_branch }}"
            echo ""
            echo "--- Required status checks ---"
            REQUIRED_JSON=$(gh api "repos/${REPO}/branches/${BASE_BRANCH}/protection/required_status_checks" 2>/dev/null || echo "{}")

            # Check for API error response (403, 404, etc.)
            if echo "$REQUIRED_JSON" | jq -e '.message' >/dev/null 2>&1; then
              ERROR_MSG=$(echo "$REQUIRED_JSON" | jq -r '.message')
              echo "Branch protection API returned: ${ERROR_MSG}"
              echo "The app token likely needs administration:read permission on ${REPO}."
              if [ "$TOTAL_CHECKS" -eq 0 ]; then
                echo "No check runs reported. Cannot verify CI health. Treating as failing."
                echo "status=failing" >> "$GITHUB_OUTPUT"
              else
                echo "Falling back to check-run-based result — CI may miss checks not yet reported."
                echo "status=passing" >> "$GITHUB_OUTPUT"
              fi
            elif echo "$REQUIRED_JSON" | jq -e '.contexts' >/dev/null 2>&1; then
              echo "Required contexts:"
              echo "$REQUIRED_JSON" | jq -r '.contexts[]'
              echo ""

              ALL_GOOD=true
              while IFS= read -r ctx; do
                [ -z "$ctx" ] && continue
                MATCH=$(echo "$CHECK_RUNS_JSON" | jq -r --arg ctx "$ctx" '[.check_runs[] | select(.name == $ctx)]')
                COUNT=$(echo "$MATCH" | jq 'length')
                if [ "$COUNT" -eq 0 ]; then
                  echo "MISSING required check: ${ctx} (not yet reported)"
                  ALL_GOOD=false
                else
                  CONCLUSION=$(echo "$MATCH" | jq -r '.[0].conclusion')
                  echo "  ${ctx}: ${CONCLUSION}"
                  if [ "$CONCLUSION" != "success" ] && [ "$CONCLUSION" != "neutral" ] && [ "$CONCLUSION" != "skipped" ]; then
                    echo "  ^^ REQUIRED CHECK NOT PASSING"
                    ALL_GOOD=false
                  fi
                fi
              done < <(echo "$REQUIRED_JSON" | jq -r '.contexts[]')

              if [ "$ALL_GOOD" = true ]; then
                echo ""
                echo "All required status checks are passing."
                echo "status=passing" >> "$GITHUB_OUTPUT"
              else
                echo ""
                echo "One or more required checks are missing or failing."
                echo "status=failing" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "Branch protection API returned an unexpected response or no contexts configured."
              if [ "$TOTAL_CHECKS" -eq 0 ]; then
                echo "No check runs reported. Cannot verify CI health. Treating as failing."
                echo "status=failing" >> "$GITHUB_OUTPUT"
              else
                echo "Falling back to check-run-based result."
                echo "status=passing" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      - name: Check implementation completeness
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        id: completeness
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q '.body')
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oEi '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[[:space:]]*#[0-9]+' | grep -oE '[0-9]+' || true)

          UNCHECKED=0
          ISSUE_NUM=""
          if [ -n "$ISSUE_NUMBERS" ]; then
            for ISSUE in $ISSUE_NUMBERS; do
              BODY=$(gh issue view "$ISSUE" --repo "$REPO" --json body -q '.body' 2>/dev/null || true)
              COMMENTS=$(gh issue view "$ISSUE" --repo "$REPO" --json comments -q '.comments[].body' 2>/dev/null || true)
              COUNT=$(echo "$BODY"$'\n'"$COMMENTS" | grep -c '\- \[ \]' || true)
              if [ "$COUNT" -gt 0 ]; then
                UNCHECKED=$COUNT
                ISSUE_NUM=$ISSUE
                break
              fi
            done
          fi

          if [ "$UNCHECKED" -gt 0 ]; then
            echo "implementation_complete=false" >> "$GITHUB_OUTPUT"
            echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
            echo "Found $UNCHECKED unchecked subtasks in issue #$ISSUE_NUM"
          else
            echo "implementation_complete=true" >> "$GITHUB_OUTPUT"
            echo "No unchecked subtasks found"
          fi

      - name: Echo collected variables for debugging
        if: steps.validate.outputs.should_run == 'true'
        run: |
          echo "=== OpenCode Complete Gate Variables ==="
          echo "pr_number=${{ steps.meta.outputs.pr_number }}"
          echo "head_sha=${{ steps.meta.outputs.head_sha }}"
          echo "should_run=${{ steps.validate.outputs.should_run }}"
          echo "attempts_count=${{ steps.attempts.outputs.count }}"
          echo "attempts_exhausted=${{ steps.attempts.outputs.exhausted }}"
          echo "merge_state=${{ steps.mergeable.outputs.merge_state }}"
          echo "has_conflicts=${{ steps.mergeable.outputs.has_conflicts }}"
          echo "ci_status=${{ steps.ci.outputs.status }}"
          echo "implementation_complete=${{ steps.completeness.outputs.implementation_complete }}"
          echo "issue_number=${{ steps.completeness.outputs.issue_number }}"
          echo "========================================="

      - name: Remove auto-review label (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "auto-review"

      - name: Update progress comment — plan-and-implement
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true' && steps.completeness.outputs.implementation_complete == 'false'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
          ISSUE_NUM: ${{ steps.completeness.outputs.issue_number }}
        run: |
          BODY=$(printf '🤖 **OpenCode Complete Gate** — CI is failing and implementation is incomplete. Running plan-and-implement for issue #%s...\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "$ISSUE_NUM" "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Run plan-and-implement skill (CI failing, incomplete)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true' && steps.completeness.outputs.implementation_complete == 'false'
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          opencode run --model opencode-go/deepseek-v4-pro "Load the plan-and-implement skill and run it for issue #${{ steps.completeness.outputs.issue_number }}"

      - name: Update progress comment — fix-pr
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true' && steps.completeness.outputs.implementation_complete == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          ATTEMPT=$(( ${{ steps.attempts.outputs.count }} + 1 ))
          BODY=$(printf '🤖 **OpenCode Complete Gate** — CI is failing. Running fix-pr (attempt %s of 3)...\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "$ATTEMPT" "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Run fix-pr skill (CI failing, complete)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true' && steps.completeness.outputs.implementation_complete == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          opencode run --model opencode-go/deepseek-v4-pro "Load the fix-pr skill and run it for PR #${{ steps.meta.outputs.pr_number }} with context ci-failing"

      - name: Record autofix attempt (CI failing, complete)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true' && steps.completeness.outputs.implementation_complete == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=${{ steps.attempts.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-attempts-$COUNT" || true
          fi
          NEXT=$((COUNT + 1))
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-attempts-$NEXT"

      - name: Re-add auto-review label (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-review"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready for review" || true

      - name: Update progress comment — CI exhausted
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          BODY=$(printf '🤖 **OpenCode Complete Gate** — CI is failing after 3 autofix attempts. Manual intervention required.\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Post exhaustion warning (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-exhausted"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ Autofix exhausted after 3 attempts (CI failing). Manual intervention required."

      - name: Update progress comment — review-pr
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          BODY=$(printf '🤖 **OpenCode Complete Gate** — CI is passing. Running review-pr...\n\n[Run %s](https://github.com/%s/actions/runs/%s)' "${{ github.run_id }}" "$REPO" "${{ github.run_id }}")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"

      - name: Run review-pr skill (CI passing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing' && steps.validate.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: high
        run: |
          opencode run --model opencode-go/deepseek-v4-pro "Load the review-pr skill and run it for PR #${{ steps.meta.outputs.pr_number }}"

      - name: Promote PR to ready for review
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr ready "$PR_NUMBER" --repo "$REPO" || true

      - name: Reset autofix attempt labels
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          for i in 1 2 3; do
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-attempts-$i" || true
          done
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-exhausted" || true

      - name: Add ready for review label
        if: |
          steps.validate.outputs.should_run == 'true' && (
            (steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted == 'true') ||
            (steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing') ||
            (steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted == 'true')
          )
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "auto-review" || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "ready for review"

      - name: Remove gate-running label
        if: always() && steps.meta.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "gate-running" || true

      - name: Update progress comment with final status
        if: always() && steps.validate.outputs.should_run == 'true' && steps.progress_comment.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ **OpenCode Complete Gate finished**"
          elif [ "${{ job.status }}" == "failure" ]; then
            STATUS="❌ **OpenCode Complete Gate failed**"
          else
            STATUS="⚠️ **OpenCode Complete Gate ended**"
          fi

          DETAILS=""
          HAS_CONFLICTS="${{ steps.mergeable.outputs.has_conflicts }}"
          CI_STATUS="${{ steps.ci.outputs.status }}"
          EXHAUSTED="${{ steps.attempts.outputs.exhausted }}"
          IMPL_COMPLETE="${{ steps.completeness.outputs.implementation_complete }}"
          ISSUE_NUM="${{ steps.completeness.outputs.issue_number }}"

          if [ "$HAS_CONFLICTS" == "true" ]; then
            if [ "$EXHAUSTED" == "true" ]; then
              DETAILS="Merge conflicts detected. Autofix exhausted after 3 attempts. Manual intervention required."
            else
              DETAILS="Merge conflicts detected. Attempted conflict resolution (attempt ${{ steps.attempts.outputs.count }} of 3)."
            fi
          elif [ "$CI_STATUS" == "failing" ]; then
            if [ "$EXHAUSTED" == "true" ]; then
              DETAILS="CI is failing. Autofix exhausted after 3 attempts. Manual intervention required."
            elif [ "$IMPL_COMPLETE" == "false" ]; then
              DETAILS="CI is failing and implementation is incomplete. Triggered plan-and-implement for issue #${ISSUE_NUM}."
            else
              DETAILS="CI is failing. Triggered fix-pr (attempt ${{ steps.attempts.outputs.count }} of 3)."
            fi
          elif [ "$CI_STATUS" == "passing" ]; then
            DETAILS="CI is passing. Triggered review-pr."
          fi

          BODY=$(printf '%b' "${STATUS}\n\n${DETAILS}\n\n[Run ${{ github.run_id }}](https://github.com/${REPO}/actions/runs/${{ github.run_id }})")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="${BODY}" || true
