name: OpenCode — Complete Gate

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true

jobs:
  complete-gate:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'pull_request' && github.event.label.name == 'complete') ||
      github.event_name == 'check_run'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      checks: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          bash .ai-workflows/scripts/bootstrap-skills.sh \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills

      - name: Ensure autofix attempt labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for i in 1 2 3; do
            gh label create "autofix-attempts-$i" --repo "$REPO" --color "d93f0b" --description "Autofix attempt counter" || true
          done
          gh label create "autofix-exhausted" --repo "$REPO" --color "b60205" --description "Autofix retries exhausted — manual intervention required" || true

      - name: Determine PR number and head SHA
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" == "check_run" ]; then
            PR_NUMBER="${{ github.event.check_run.pull_requests[0].number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid -q .headRefOid)
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate PR labels
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" != "check_run" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this check run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name')
          if ! echo "$PR_LABELS" | grep -q "^complete$"; then
            echo "PR does not have 'complete' label."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check associated issue for opencode label
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q '.body')
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oEi '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[[:space:]]*#[0-9]+' | grep -oE '[0-9]+' || true)

          if [ -n "$ISSUE_NUMBERS" ]; then
            for ISSUE in $ISSUE_NUMBERS; do
              ISSUE_LABELS=$(gh issue view "$ISSUE" --repo "$REPO" --json labels -q '.labels[].name' 2>/dev/null || true)
              if echo "$ISSUE_LABELS" | grep -q "^opencode$"; then
                echo "Associated issue #$ISSUE has 'opencode' label."
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
            echo "No associated issue has 'opencode' label."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No associated issue found. Proceeding without opencode check."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Install OpenCode
        if: steps.validate.outputs.should_run == 'true'
        run: npm install -g opencode-ai@1.14.24

      - name: Count autofix attempts
        id: attempts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name')
          COUNT=0
          for i in 1 2 3; do
            if echo "$LABELS" | grep -q "^autofix-attempts-$i$"; then
              COUNT=$i
            fi
          done
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge 3 ]; then
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
          else
            echo "exhausted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check mergeability
        id: mergeable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          MERGE_STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeable,mergeStateStatus -q '.mergeable + " " + .mergeStateStatus')
          echo "merge_state=${MERGE_STATE}" >> "$GITHUB_OUTPUT"
          if echo "$MERGE_STATE" | grep -q 'CONFLICTING\|DIRTY'; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove complete label (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "complete"

      - name: Resolve merge conflicts
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        run: |
          opencode run --model opencode-go/kimi-k2.6 "Load the resolve-pr-conflicts skill and run it for PR #${{ steps.meta.outputs.pr_number }}"

      - name: Record autofix attempt (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=${{ steps.attempts.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-attempts-$COUNT" || true
          fi
          NEXT=$((COUNT + 1))
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-attempts-$NEXT"

      - name: Re-add complete label (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "complete"

      - name: Post exhaustion warning (conflicts)
        if: steps.mergeable.outputs.has_conflicts == 'true' && steps.attempts.outputs.exhausted == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-exhausted"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ Autofix exhausted after 3 attempts (conflict resolution). Manual intervention required."

      - name: Wait for checks to finish
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.validate.outputs.should_run == 'true'
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
        run: |
          # Fetch required check names from branch protection (if available)
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName -q .baseRefName)
          REQUIRED_NAMES=$(gh api "repos/${REPO}/branches/${BASE_BRANCH}/protection/required_status_checks" \
            --jq '((.contexts // []) + ([.checks[]?.context] // [])) | .[]' 2>/dev/null | sort -u || true)

          if [ -n "$REQUIRED_NAMES" ]; then
            echo "Monitoring required checks only."
            JQ_ARRAY=$(echo "$REQUIRED_NAMES" | jq -R . | jq -s . | tr -d '\n')
            INCOMPLETE_JQ="[.check_runs[] | select(.name as \$n | $JQ_ARRAY | index(\$n) != null) | select(.status != \"completed\")] | length"
            CONCLUSIONS_JQ=".check_runs[] | select(.name as \$n | $JQ_ARRAY | index(\$n) != null) | select(.status == \"completed\") | .conclusion"
          else
            echo "No required checks found (or no permission). Monitoring all non-OpenCode checks."
            INCOMPLETE_JQ="[.check_runs[] | select(.status != \"completed\" and (.name | startswith(\"OpenCode\") | not))] | length"
            CONCLUSIONS_JQ=".check_runs[] | select(.status == \"completed\" and (.name | startswith(\"OpenCode\") | not)) | .conclusion"
          fi

          if [ "${{ github.event_name }}" == "check_run" ]; then
            # If the triggering check failed, CI is failing regardless of other checks
            if [ "${{ github.event.check_run.conclusion }}" != "success" ]; then
              echo "status=failing" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Are all required checks done?
            INCOMPLETE=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq "$INCOMPLETE_JQ")
            if [ "$INCOMPLETE" -gt 0 ]; then
              echo "Required checks still running ($INCOMPLETE). Exiting early."
              exit 0
            fi

            echo "status=passing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # labeled / workflow_dispatch trigger: poll until required checks finish
          for i in {1..60}; do
            INCOMPLETE=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq "$INCOMPLETE_JQ")
            if [ "$INCOMPLETE" -gt 0 ]; then
              echo "Waiting for ${INCOMPLETE} required check(s) to complete..."
              sleep 10
            else
              break
            fi
          done

          CONCLUSIONS=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq "$CONCLUSIONS_JQ")
          if echo "$CONCLUSIONS" | grep -qE 'failure|cancelled|timed_out'; then
            echo "status=failing" >> "$GITHUB_OUTPUT"
          else
            echo "status=passing" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove complete label (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "complete"

      - name: Run fix-pr skill (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        run: |
          opencode run --model opencode-go/kimi-k2.6 "Load the fix-pr skill and run it for PR #${{ steps.meta.outputs.pr_number }} with context ci-failing"

      - name: Record autofix attempt (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=${{ steps.attempts.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-attempts-$COUNT" || true
          fi
          NEXT=$((COUNT + 1))
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-attempts-$NEXT"

      - name: Re-add complete label (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted != 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "complete"

      - name: Post exhaustion warning (CI failing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'failing' && steps.attempts.outputs.exhausted == 'true' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autofix-exhausted"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ Autofix exhausted after 3 attempts (CI failing). Manual intervention required."

      - name: Run review-pr skill (CI passing)
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing' && steps.validate.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        run: |
          opencode run --model opencode-go/kimi-k2.6 "Load the review-pr skill and run it for PR #${{ steps.meta.outputs.pr_number }}"

      - name: Reset autofix attempt labels
        if: steps.mergeable.outputs.has_conflicts == 'false' && steps.ci.outputs.status == 'passing' && steps.validate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          for i in 1 2 3; do
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-attempts-$i" || true
          done
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "autofix-exhausted" || true
