name: OpenCode Dispatcher

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true

jobs:
  opencode-dispatcher:
    if: |
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode')) &&
      !contains(github.event.comment.body, '/oc code-review') &&
      !contains(github.event.comment.body, '/oc fix-pr') &&
      !contains(github.event.comment.body, '/oc complete-gate') &&
      !contains(github.event.comment.body, '/oc plan') &&
      !contains(github.event.comment.body, '/oc address-review') &&
      !contains(github.event.comment.body, '/oc do') &&
       github.actor == 'phuhl'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        with:
          model: opencode-go/deepseek-v4-pro
          variant: max
