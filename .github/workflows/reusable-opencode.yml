name: OpenCode Dispatcher

on:
  workflow_call:
    inputs:
      ALLOWED_ACTORS:
        type: string
        default: 'phuhl'
        required: false
      BYPASS_ACTOR_CHECK:
        type: string
        default: false
        required: false
      WORKFLOWS_REPO:
        type: string
        default: 'apparts-js/ai-workflows'
        required: false
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-dispatcher:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode')) &&
      !(contains(github.event.comment.body, '/oc code-review') || contains(github.event.comment.body, '/opencode code-review')) &&
      !(contains(github.event.comment.body, '/oc fix-pr') || contains(github.event.comment.body, '/opencode fix-pr')) &&
      !(contains(github.event.comment.body, '/oc complete-gate') || contains(github.event.comment.body, '/opencode complete-gate')) &&
      !(contains(github.event.comment.body, '/oc plan') || contains(github.event.comment.body, '/opencode plan')) &&
      !(contains(github.event.comment.body, '/oc address-review') || contains(github.event.comment.body, '/opencode address-review')) &&
       !(contains(github.event.comment.body, '/oc do') || contains(github.event.comment.body, '/opencode do')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Generate App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.WORKFLOWS_REPO }}
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/src/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run opencode
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          opencode run --model opencode-go/deepseek-v4-pro "Handle the trigger event" 2>&1 | tee /tmp/opencode-dispatcher.log

      - name: Extract token usage
        if: always()
        run: |
          if [ -f /tmp/opencode-dispatcher.log ]; then
            npx tsx .opencode/skills/_shared/scripts/extract-token-usage.ts /tmp/opencode-dispatcher.log "dispatcher" || true
          fi
