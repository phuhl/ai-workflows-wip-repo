name: OpenCode Master Router

on:
  workflow_call:
    inputs:
      ALLOWED_ACTORS:
        type: string
        default: 'phuhl'
        required: false
      BYPASS_ACTOR_CHECK:
        type: string
        default: false
        required: false
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-dispatcher:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode')) &&
      !(contains(github.event.comment.body, '/oc code-review') || contains(github.event.comment.body, '/opencode code-review')) &&
      !(contains(github.event.comment.body, '/oc fix-pr') || contains(github.event.comment.body, '/opencode fix-pr')) &&
      !(contains(github.event.comment.body, '/oc plan') || contains(github.event.comment.body, '/opencode plan')) &&
      !(contains(github.event.comment.body, '/oc address-review') || contains(github.event.comment.body, '/opencode address-review')) &&
      !(contains(github.event.comment.body, '/oc do') || contains(github.event.comment.body, '/opencode do')) &&
      (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-do:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.type != 'Bot' &&
       (contains(github.event.comment.body, '/oc do') || contains(github.event.comment.body, '/opencode do')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-do.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-plan:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       !github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc plan') || contains(github.event.comment.body, '/opencode plan')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-plan.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-fix-pr:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc fix-pr') || contains(github.event.comment.body, '/opencode fix-pr')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-fix-pr.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-code-review:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc code-review') || contains(github.event.comment.body, '/opencode code-review')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-code-review.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-address-review:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'pull_request_review' &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.event.review.user.login)) &&
       (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented')) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc address-review') || contains(github.event.comment.body, '/opencode address-review')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-address-review.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-complete-gate:
    concurrency:
      group: complete-gate-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'pull_request' && github.event.label.name == 'auto-review') ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc complete-gate') || contains(github.event.comment.body, '/opencode complete-gate')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-complete-gate.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}

  opencode-plan-and-implement:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'issues' && github.event.label.name == 'opencode' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-plan-and-implement.yml@master
    secrets: inherit
    with:
      ALLOWED_ACTORS: ${{ inputs.ALLOWED_ACTORS }}
      BYPASS_ACTOR_CHECK: ${{ inputs.BYPASS_ACTOR_CHECK }}
