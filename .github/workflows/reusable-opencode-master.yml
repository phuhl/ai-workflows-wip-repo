name: OpenCode Master Router

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-dispatcher:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode')) &&
      !contains(github.event.comment.body, '/oc code-review') &&
      !contains(github.event.comment.body, '/oc fix-pr') &&
      !contains(github.event.comment.body, '/oc plan') &&
      !contains(github.event.comment.body, '/oc address-review') &&
      !contains(github.event.comment.body, '/oc do') &&
      github.actor == 'phuhl'
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode.yml@master
    secrets: inherit

  opencode-do:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '/oc do') &&
      github.actor == 'phuhl'
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-do.yml@master
    secrets: inherit

  opencode-plan:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc plan') &&
       github.actor == 'phuhl')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-plan.yml@master
    secrets: inherit

  opencode-fix-pr:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc fix-pr') &&
       github.actor == 'phuhl')
    uses: ./.github/workflows/reusable-opencode-fix-pr.yml
    secrets: inherit

  opencode-code-review:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc code-review') &&
       github.actor == 'phuhl')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-code-review.yml@master
    secrets: inherit

  opencode-address-review:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'phuhl' &&
       (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc address-review') &&
       github.actor == 'phuhl')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-address-review.yml@master
    secrets: inherit

  opencode-complete-gate:
    concurrency:
      group: complete-gate-${{ github.event.inputs.pr_number || github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'auto-review') ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc complete-gate') &&
       github.actor == 'phuhl')
    uses: ./.github/workflows/reusable-opencode-complete-gate.yml
    secrets: inherit

  opencode-plan-and-implement:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issues' && github.event.label.name == 'opencode' && github.actor == 'phuhl')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-plan-and-implement.yml@master
    secrets: inherit
