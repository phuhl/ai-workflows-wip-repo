name: OpenCode — Plan and Implement

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-plan-and-implement:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issues' && github.event.label.name == 'opencode' && github.actor == 'phuhl')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Generate App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          bash .ai-workflows/scripts/bootstrap-skills.sh \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills

      - name: Configure Git
        run: |
          git config user.name "opencode[bot]"
          git config user.email "opencode[bot]@users.noreply.github.com"

      - name: Create progress comment
        id: progress_comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ISSUE: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$'🤖 **OpenCode is planning and implementing this issue...**\n\nThe plan-and-implement skill has started. This comment will be updated when the run completes.\n\n[Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${ISSUE}/comments" \
            --jq '.id' \
            -f body="$BODY") || echo "")
          echo "comment_id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Remove auto-review label
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --json number,headRefName -q ".[] | select(.headRefName | startswith(\"${ISSUE}-\")) | .number")
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "auto-review" || true
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready for review" || true
          fi

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run plan-and-implement skill
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          ISSUE="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          opencode run --model opencode-go/deepseek-v4-pro "Load the plan-and-implement skill and run it for issue #${ISSUE}"

      - name: Re-add auto-review label
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --json number,headRefName -q ".[] | select(.headRefName | startswith(\"${ISSUE}-\")) | .number")
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label auto-review
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready for review" || true
          fi

      - name: Update progress comment
        if: always() && steps.progress_comment.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ **OpenCode plan-and-implement finished**"
          elif [ "${{ job.status }}" == "failure" ]; then
            STATUS="❌ **OpenCode plan-and-implement failed**"
          else
            STATUS="⚠️ **OpenCode plan-and-implement ended**"
          fi
          BODY=$(printf '%b' "${STATUS}\n\n[Run ${{ github.run_id }}](https://github.com/${REPO}/actions/runs/${{ github.run_id }})")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="${BODY}" || true
