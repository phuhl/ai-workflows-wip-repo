name: OpenCode — Do

on:
  workflow_call:
    inputs:
      ALLOWED_ACTORS:
        type: string
        default: 'phuhl'
        required: false
      BYPASS_ACTOR_CHECK:
        type: string
        default: false
        required: false
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-do:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, '/oc do') || contains(github.event.comment.body, '/opencode do')) &&
      (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Generate App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Install target repo dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Configure Git
        run: |
          git config user.name "opencode[bot]"
          git config user.email "opencode[bot]@users.noreply.github.com"
          echo ".opencode/do-prompt.txt" >> .gitignore

      - name: Create progress comment
        id: progress_comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$'🤖 **OpenCode is running your prompt...**\n\nThe `/oc do` command has started. This comment will be updated when the run completes.\n\n[Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${NUMBER}/comments" \
            --jq '.id' \
            -f body="$BODY" || echo "")
          echo "comment_id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run user prompt
        id: do_run
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          COMMENT="${{ github.event.comment.body }}"
          PROMPT=$(echo "$COMMENT" | sed -E 's/.*\/oc do\s*//i')
          NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          echo "User prompt: ${PROMPT}"
          echo "Issue/PR number: ${NUMBER}"
          printf '%s' "${PROMPT}" > .opencode/do-prompt.txt
          opencode run --model opencode-go/deepseek-v4-pro "Load the user-do skill. Run it for issue/PR #${NUMBER}. Read the user prompt from .opencode/do-prompt.txt" 2>&1 | tee /tmp/opencode-do.log
          rm -f .opencode/do-prompt.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post error comment on failure
        if: steps.do_run.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          ERROR_TAIL=$(tail -n 20 /tmp/opencode-do.log 2>/dev/null || echo "No log captured")
          BODY=$(printf '%b' "❌ **OpenCode /oc do encountered an error**\n\n\`\`\`\n${ERROR_TAIL}\n\`\`\`\n\n[Run ${{ github.run_id }}](https://github.com/${REPO}/actions/runs/${{ github.run_id }})")
          gh api "repos/${REPO}/issues/${NUMBER}/comments" -f body="$BODY" || true

      - name: Update progress comment
        if: always() && steps.progress_comment.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ **OpenCode /oc do finished**"
          elif [ "${{ job.status }}" == "failure" ]; then
            STATUS="❌ **OpenCode /oc do failed**"
          else
            STATUS="⚠️ **OpenCode /oc do ended**"
          fi
          BODY=$(printf '%b' "${STATUS}\n\n[Run ${{ github.run_id }}](https://github.com/${REPO}/actions/runs/${{ github.run_id }})")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="${BODY}" || true
