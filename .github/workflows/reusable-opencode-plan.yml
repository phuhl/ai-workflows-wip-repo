name: OpenCode — Plan

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true

jobs:
  opencode-plan:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc plan') || contains(github.event.comment.body, '/opencode plan')) &&
       github.actor == 'phuhl')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run plan skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          ISSUE="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          opencode run --model opencode-go/deepseek-v4-pro "Load the plan skill and run it for issue #${ISSUE}"
