name: OpenCode — Plan

on:
  workflow_call:
    inputs:
      ALLOWED_ACTORS:
        type: string
        default: 'phuhl'
        required: false
      BYPASS_ACTOR_CHECK:
        type: string
        default: false
        required: false
      WORKFLOWS_REPO:
        type: string
        default: 'apparts-js/ai-workflows'
        required: false
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-plan:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc plan') || contains(github.event.comment.body, '/opencode plan')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Generate App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.WORKFLOWS_REPO }}
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/src/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24


      - name: Initialize stats snapshot
        run: |
          npx tsx .opencode/skills/_shared/scripts/stats-snapshot.ts --save /tmp/opencode-stats.json
      - name: Run plan skill
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          ISSUE="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          opencode run --model opencode-go/deepseek-v4-pro "Load the plan skill and run it for issue #${ISSUE}" 2>&1 | tee /tmp/opencode-plan.log

      - name: Extract token usage
        if: always()
        run: |
          if [ -f /tmp/opencode-plan.log ]; then
            npx tsx .opencode/skills/_shared/scripts/extract-token-usage.ts --delta "plan" --model opencode-go/deepseek-v4-pro --variant max || true
          fi
