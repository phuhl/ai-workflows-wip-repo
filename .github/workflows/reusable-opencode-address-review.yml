name: OpenCode — Address Review

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: true
      OPENCODE_API_KEY:
        required: true

jobs:
  address-review:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'phuhl' &&
       (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          bash .ai-workflows/scripts/bootstrap-skills.sh \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills

      - name: Configure Git
        run: |
          git config user.name "opencode[bot]"
          git config user.email "opencode[bot]@users.noreply.github.com"

      - name: Remove complete label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "complete" || true

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run fix-pr skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        run: |
          opencode run --model opencode-go/kimi-k2.6 "Load the fix-pr skill and run it for PR #${{ github.event.pull_request.number || github.event.inputs.pr_number }} with context review-comments"

      - name: Re-add complete label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "complete"
