name: OpenCode — Address Review

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true

jobs:
  address-review:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'phuhl' &&
       (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          bash .ai-workflows/scripts/bootstrap-skills.sh \
            --shared-dir .ai-workflows/.opencode/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills

      - name: Configure Git
        run: |
          git config user.name "opencode[bot]"
          git config user.email "opencode[bot]@users.noreply.github.com"

      - name: Create progress comment
        id: progress_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.id' \
            -f body="🤖 **OpenCode is addressing review comments on this PR...**\n\nThe address-review workflow has started. This comment will be updated when the run completes." || echo "")
          echo "comment_id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Remove auto-review label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "auto-review" || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready for review" || true

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run fix-pr skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        run: |
          opencode run --model opencode-go/kimi-k2.6 "Load the fix-pr skill and run it for PR #${{ github.event.pull_request.number || github.event.inputs.pr_number }} with context review-comments"

      - name: Re-add auto-review label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-review"

      - name: Update progress comment
        if: always() && steps.progress_comment.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ **OpenCode address-review finished**"
          elif [ "${{ job.status }}" == "failure" ]; then
            STATUS="❌ **OpenCode address-review failed**"
          else
            STATUS="⚠️ **OpenCode address-review ended**"
          fi
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="${STATUS}\n\n_Run ID: ${{ github.run_id }}_" || true
