name: OpenCode — Address Review

on:
  workflow_call:
    inputs:
      ALLOWED_ACTORS:
        type: string
        default: 'phuhl'
        required: false
      BYPASS_ACTOR_CHECK:
        type: string
        default: false
        required: false
    secrets:
      OPENCODE_API_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  opencode-address-review:
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor))) ||
      (github.event_name == 'pull_request_review' &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.event.review.user.login)) &&
       (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/oc address-review') || contains(github.event.comment.body, '/opencode address-review')) &&
       (inputs.BYPASS_ACTOR_CHECK || contains(inputs.ALLOWED_ACTORS, github.actor)))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Generate App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Checkout shared workflows
        uses: actions/checkout@v4
        with:
          repository: apparts-js/ai-workflows
          path: .ai-workflows
          persist-credentials: false

      - name: Bootstrap skills
        run: |
          npx tsx .ai-workflows/scripts/bootstrap-skills.ts \
            --shared-dir .ai-workflows/src/skills \
            --local-dir .opencode/skills \
            --out-dir .opencode/skills
            echo "*" > .ai-workflows/.gitignore

      - name: Install target repo dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Configure Git
        run: |
          git config user.name "opencode[bot]"
          git config user.email "opencode[bot]@users.noreply.github.com"

      - name: Create progress comment
        id: progress_comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$'🤖 **OpenCode is addressing review comments on this PR...**\n\nThe address-review workflow has started. This comment will be updated when the run completes.\n\n[Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.id' \
            -f body="$BODY" || echo "")
          echo "comment_id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Remove auto-review label
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "auto-review" || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready for review" || true

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Pre-fetch PR context
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
        run: |
          npx tsx .opencode/skills/_shared/scripts/fetch-pr-context.ts "$PR_NUMBER" || true

      - name: Run fix-pr skill
        id: fix_pr
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          VARIANT: max
        run: |
          opencode run --model opencode-go/deepseek-v4-pro "Load the fix-pr skill and run it for PR #${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }} with context review-comments" 2>&1 | tee /tmp/opencode-fix-pr.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post error comment on failure
        if: steps.fix_pr.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          ERROR_TAIL=$(tail -n 20 /tmp/opencode-fix-pr.log 2>/dev/null || echo "No log captured")
          BODY=$(printf '%b' "❌ **OpenCode address-review encountered an error**\n\n\`\`\`\n${ERROR_TAIL}\n\`\`\`\n\n[Run ${{ github.run_id }}](https://github.com/${REPO}/actions/runs/${{ github.run_id }})")
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY" || true

      - name: Re-add auto-review label
        if: always()
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-review"

      - name: Update progress comment
        if: always() && steps.progress_comment.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ **OpenCode address-review finished**"
          elif [ "${{ job.status }}" == "failure" ]; then
            STATUS="❌ **OpenCode address-review failed**"
          else
            STATUS="⚠️ **OpenCode address-review ended**"
          fi
          BODY=$(printf '%b' "${STATUS}\n\n[Run ${{ github.run_id }}](https://github.com/${REPO}/actions/runs/${{ github.run_id }})")
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="${BODY}" || true
