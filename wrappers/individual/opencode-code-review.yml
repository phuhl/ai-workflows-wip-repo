name: OpenCode — Code Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
      comment_id:
        description: 'Triggering comment ID'
        required: true

jobs:
  code-review:
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-code-review.yml@main
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
