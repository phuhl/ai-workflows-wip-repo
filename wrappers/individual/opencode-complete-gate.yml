name: OpenCode — Complete Gate

on:
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: ["Run API Tests"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check'
        required: true

jobs:
  complete-gate:
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-complete-gate.yml@master
    secrets: inherit
