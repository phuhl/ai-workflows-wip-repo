name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for address-review, code-review, complete-gate)'
        required: false
      comment_id:
        description: 'Triggering comment ID (for code-review)'
        required: false
      issue_number:
        description: 'Issue number (for plan-and-implement)'
        required: false

jobs:
  master:
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-master.yml@main
    secrets: inherit
