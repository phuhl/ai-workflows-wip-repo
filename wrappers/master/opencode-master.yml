name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for address-review, code-review, complete-gate)'
        required: false
      comment_id:
        description: 'Triggering comment ID (for code-review)'
        required: false
      issue_number:
        description: 'Issue number (for plan-and-implement)'
        required: false

jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (contains(github.event.comment.body, ' /oc') ||
       startsWith(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode')) &&
      !contains(github.event.comment.body, '/oc code-review') &&
       github.actor == 'phuhl'
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode.yml@main
    secrets: inherit

  code-review:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc code-review') &&
       github.actor == 'phuhl')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-code-review.yml@main
    secrets: inherit

  address-review:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'phuhl' &&
       (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented'))
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-address-review.yml@main
    secrets: inherit

  complete-gate:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'complete')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-complete-gate.yml@main
    secrets: inherit

  plan-and-implement:
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issues' && github.event.label.name == 'opencode' && github.actor == 'phuhl')
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-plan-and-implement.yml@main
    secrets: inherit
