name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: ["Run API Tests"]
    types: [completed]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for address-review, code-review, complete-gate)'
        required: false
      comment_id:
        description: 'Triggering comment ID (for code-review)'
        required: false
      issue_number:
        description: 'Issue number (for plan-and-implement)'
        required: false

jobs:
  master:
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      checks: read
    uses: apparts-js/ai-workflows/.github/workflows/reusable-opencode-master.yml@master
    secrets:
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    with:
      ALLOWED_ACTORS: ${{ vars.ALLOWED_ACTORS || 'phuhl' }}
      BYPASS_ACTOR_CHECK: ${{ vars.BYPASS_ACTOR_CHECK || github.event.repository.private }}
